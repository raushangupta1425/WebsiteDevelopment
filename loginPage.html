<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" id="keywords" content="embedded projects creator login, embeddedprojectscreator.com, embeddedprojectscreator.in, projects, games, college projects, mechanical projects, cse projects">
    <meta name="owner" content="Raushan Kumar Gupta">
	<meta name="author" content="embedded projects creator">
    <meta name="copyright" content="embedded projects creator">
    <meta name="description" content="Embedded Projects Creator: This channel is trying to provide you each and everything that you should learn as a website developer or software developer.
    And also help you to work on different projects as well as follow up documentation tips to learn something new. And also give you a chance to work on live projects if you selected.">
    <link rel="icon" href="Logo/logo.png" type="image/x-icon">
    <title>Login Page</title>
    <style>
        @charset "utf-8";
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            height: 100vh;
            background-image: linear-gradient(45deg, #000000, #14AEA8);
            /* background-repeat: no-repeat; */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .formatting{
            width: 25%;
            height: 400px;
            background-color: transparent;
            border-radius: 10px;
            box-shadow: 5px 5px 10px ,-5px -5px 10px;
        }
        #heading{
            position: relative;
            left: 37%;
        }
        #details{
            position: relative;
            left: 40px;
            top: 80px;
            font-size: 20px;
        }
        .length{
            width: 72%;
            padding: 5px;
            border-radius: 5px;
            border: none;
        }
        a{
            text-decoration: none;
            font-size: 15px;
            color: #000000;
        }
        a:hover{
            text-decoration: underline;
        }
        #submit_btn{
            padding:10px; 
            width: 25%; 
            font-size: 15px;
            font-weight: bold;
            background-color: #bdbbbb;
            border-radius: 5px;
            border: none;
        }
        @media only screen and (max-width: 524px){
            body{
                width: 83%;
                display: inline-flex;
                justify-content: center;
                align-items: center;
            }         
            .formatting{
                width: 80%;
            }
        }
    </style>
</head>
<body>
        <div class="formatting">
            <div id="heading"><h1>Login</h1></div>
            <form>
                <div id="details">
                    <h3>Username</h3>
                    <input class="length" type="text" name="username" required="required" placeholder="Enter Username"/><br><br>
                    <h3>Password</h3>
                    <input class="length" type="password" name="password" required="required" placeholder="Enter Password"/><br><a href="#">Forget Password</a><br><br>
                    <div><input id="submit_btn" type="submit" name="submit" value="Login"/></div>
                </div>
            </form>
        </div>
</body>
</html>
