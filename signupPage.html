<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" id="keywords" content="embedded projects creator signup, embeddedprojectscreator.com, embeddedprojectscreator.in, projects, games, college projects, mechanical projects, cse projects">
    <meta name="owner" content="Raushan Kumar Gupta">
	<meta name="author" content="embedded projects creator">
    <meta name="copyright" content="embedded projects creator">
    <meta name="description" content="Embedded Projects Creator: This channel is trying to provide you each and everything that you should learn as a website developer or software developer.
    And also help you to work on different projects as well as follow up documentation tips to learn something new. And also give you a chance to work on live projects if you selected.">
    <link rel="icon" href="Logo/logo.png" type="image/x-icon">
    <title>SignUp Page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 130vh;
            background-image: linear-gradient(45deg, #000000, #14AEA8);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .formatting{
            width: 400px;
            height: 700px;
            background-color: transparent;
            border: 2px solid;
            border-radius: 10px;
            box-shadow: 5px 5px 10px ,-5px -5px 10px;
        }
        #heading{
            position: relative;
            left: 145px;
            top: 0px;
        }
        #details{
            position: relative;
            left: 75px;
            top: 40px;
            font-size: 20px;
        }
        .length{
            width: 250px;
            padding: 5px;
            border-radius: 5px;
            border: none;
        }
        #submit_button{
            padding:10px; 
            width: 90px; 
            background-color: #bdbbbb;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="formatting">
            <div id="heading"><h1>SignUp</h1></div>
            <form>
                <div id="details">
                    <h3>Your Name</h3>
                    <input class="length" type="text" name="Name" required="required" placeholder="Enter Your Full Name"/><br><br>
                    <h3>Date of Birth</h3>
                    <input class="length" type="date" name="dob" required="required"/><br><br>
                    <h3>Email</h3>
                    <input class="length" type="email" name="Email" required="required" placeholder="Enter Your Email ID"/><br><br>
                    <h3>Mobile NO.</h3>
                    <input class="length" type="number" name="Mobile Number" required="required" placeholder="+91 xxxxxxxxxx"/><br><br>
                    <h3>Username</h3>
                    <input class="length" type="text" name="Username" required="required" placeholder="Enter Username"/><br><br>
                    <h3>Password</h3>
                    <input class="length" type="password" name="password" required="required" placeholder="Enter Password"/><br><br>
                    <h3>Confirm Password</h3>
                    <input class="length" type="password" name="password" required="required" placeholder="Enter password again"/><br><br>
                    <div><input id="submit_button" type="submit" name="submit" value="Register"/></div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
